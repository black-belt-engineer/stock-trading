name: stock-trading

# Local development stack.
# Optional: copy .env.local.example → .env.local for overrides and so app env matches containers.
# Compose interpolates ${...} from a `.env` file in this directory or `docker compose --env-file ...`.

services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: stock-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    env_file:
      - path: .env.local
        required: false
    environment:
      POSTGRES_DB: stockdb
      POSTGRES_USER: stockuser
      POSTGRES_PASSWORD: stockpass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - stock-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockuser -d stockdb"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: stock-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    env_file:
      - path: .env.local
        required: false
    networks:
      - stock-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  # Kafka-compatible broker (Redpanda) for local market-data streaming.
  kafka:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.11
    container_name: stock-redpanda
    restart: unless-stopped
    ports:
      - "9092:9092"
    env_file:
      - path: .env.local
        required: false
    command:
      - redpanda
      - start
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://localhost:9092
      - --mode
      - dev-container
      - --smp
      - "1"
    networks:
      - stock-net

networks:
  stock-net:
    name: stock-net
    driver: bridge

volumes:
  postgres_data:
    name: stock-postgres-data
